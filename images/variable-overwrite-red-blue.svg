  <rect x="120" y="470" width="220" height="64" rx="18" fill="#E9E2D5"/>
  <text x="230" y="511" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="28" font-weight="700" fill="#2D2A26">color = "青"</text>

